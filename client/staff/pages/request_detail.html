<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Request Detail - Staff</title>
  <link rel="stylesheet" href="../assets/css/staff.css" />
</head>
<body>
  <header class="topbar">
    <div style="display:flex; align-items:center; gap:0.5rem;">
      <img class="brandLockup" src="../assets/img/eserbisyo-lockup-light.png" alt="eSerbisyo Hub" />
      <h1 style="margin:0;">Request Detail</h1>
    </div>
    <div style="margin-left:auto; display:flex; gap:10px;">
      <button id="btnPrint" class="btn" style="background:#fff;">Print Claim Slip</button>
      <button id="logoutBtn" class="btn" style="background:#fff;">Logout</button>
    </div>
  </header>

  <main class="content" style="max-width:1100px;margin:0 auto;">
    <p class="noPrint"><a href="./dashboard.html">← Back to Dashboard</a></p>

    <section class="card" id="card" style="background:#fff;padding:16px;border-radius:12px;border:1px solid #dde6f2;">
      <h2 id="title">Loading...</h2>

      <div class="grid2">
        <div><strong>Reference:</strong> <span id="ref"></span></div>
        <div><strong>Status:</strong> <span id="status"></span></div>
        <div><strong>Payment:</strong> <span id="pay"></span></div>
        <div><strong>Service:</strong> <span id="svc"></span></div>
        <div><strong>Name:</strong> <span id="name"></span></div>
        <div><strong>Mobile:</strong> <span id="mobile"></span></div>
        <div style="grid-column:1/-1;"><strong>Address:</strong> <span id="addr"></span></div>
      </div>

      <hr />

      <h3>Actions</h3>
      <div class="actionsRow noPrint">
        <select id="newStatus">
          <option value="Queued">Queued</option>
          <option value="Under Review">Under Review</option>
          <option value="For Payment Verification">For Payment Verification</option>
          <option value="In Process">In Process</option>
          <option value="Ready for Release">Ready for Release</option>
          <option value="Released">Released</option>
        </select>
        <input id="note" placeholder="Note (optional)" />
        <button class="btn" id="btnStatus">Update Status</button>
      </div>

      <div class="actionsRow noPrint">
        <input id="orNo" placeholder="OR No (optional)" />
        <input id="amt" placeholder="Paid amount" />
        <button class="btn" id="btnPay">Verify Payment</button>
      </div>

      <div class="actionsRow noPrint">
        <input id="smsMsg" placeholder="Custom SMS message (optional)" style="flex:1;" />
        <button class="btn" id="btnSms">Send Ready SMS (Log)</button>
        <button class="btn" id="btnRelease">Mark Released</button>
      </div>

      <p class="msg" id="msg"></p>

      <hr />
      <h3>Status History</h3>
      <ul id="hist"></ul>

      <h3>SMS Logs</h3>
      <ul id="sms"></ul>

      <hr />
      <p style="font-size:14px;color:#444;">
        Claim instruction: Present this reference number at the Barangay Office to claim the document.
      </p>
    </section>
  </main>

  <script type="module" src="../assets/js/request_detail.js"></script>
</body>
</html>
